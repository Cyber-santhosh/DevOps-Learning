apiVersion: v1
kind: Pod
metadata:
  name: volume-share-devops
spec:
  containers:
  - name: volume-container-devops-1
    image: fedora:latest
    command: ["/bin/sh", "-c", "while true; do sleep 10; done"]
    volumeMounts:
    - name: volume-share
      mountPath: /tmp/blog
  containers:
  - name: volume-container-devops-2
    image: fedora:latest
    command: ["/bin/sh", "-c", "while true; do sleep 10; done"]
    volumeMounts:
    - name: volume-share
      mountPath: /tmp/cluster
  volumes:
  - name: volume-share
    emptyDir: {}
